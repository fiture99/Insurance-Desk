openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: staff
    description: Staff account management (admin only)
  - name: members
    description: Member records
  - name: requests
    description: Insurer requests
  - name: settings
    description: Facility settings
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current signed-in staff user, if any
      responses:
        "200":
          description: Current user (null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff accounts (admin only)
      responses:
        "200":
          description: List of staff accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffUser"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a staff account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created staff account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"

  /staff/{id}:
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Delete a staff account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create a member (staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{policyNo}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a member by policy number
      parameters:
        - name: policyNo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a member (staff only)
      parameters:
        - name: policyNo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Delete a member (staff only)
      parameters:
        - name: policyNo
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List all requests
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InsurerRequest"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Log a new request (staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsurerRequest"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get a request by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsurerRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /requests/{id}/advance:
    patch:
      operationId: advanceRequest
      tags: [requests]
      summary: Advance a request to its next stage (staff only). Actioning a request updates the linked member automatically.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestAdvanceInput"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsurerRequest"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get facility settings
      responses:
        "200":
          description: Facility settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacilitySettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update facility settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated facility settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacilitySettings"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary counts and in-progress requests
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    StaffRole:
      type: string
      enum: [admin, staff]

    StaffUser:
      type: object
      required: [id, username, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          $ref: "#/components/schemas/StaffRole"
        createdAt:
          type: string
          format: date-time

    StaffInput:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/StaffRole"

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    CurrentUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/StaffUser"
            - type: "null"

    RelationshipType:
      type: string
      enum: [Principal, Spouse, Child, Dependent]

    MemberStatus:
      type: string
      enum: [Active, Inactive]

    Member:
      type: object
      required:
        [
          id,
          policyNo,
          name,
          insurer,
          employer,
          relationship,
          phone,
          dob,
          status,
        ]
      properties:
        id:
          type: integer
        policyNo:
          type: string
        name:
          type: string
        insurer:
          type: string
        employer:
          type: string
        relationship:
          $ref: "#/components/schemas/RelationshipType"
        phone:
          type: string
        dob:
          type: string
        status:
          $ref: "#/components/schemas/MemberStatus"

    MemberInput:
      type: object
      required:
        [policyNo, name, insurer, employer, relationship, phone, dob, status]
      properties:
        policyNo:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        insurer:
          type: string
          minLength: 1
        employer:
          type: string
          minLength: 1
        relationship:
          $ref: "#/components/schemas/RelationshipType"
        phone:
          type: string
        dob:
          type: string
        status:
          $ref: "#/components/schemas/MemberStatus"

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        insurer:
          type: string
          minLength: 1
        employer:
          type: string
          minLength: 1
        relationship:
          $ref: "#/components/schemas/RelationshipType"
        phone:
          type: string
        dob:
          type: string
        status:
          $ref: "#/components/schemas/MemberStatus"

    RequestType:
      type: string
      enum: [Add dependent, Remove dependent, Update details, Reinstate]

    RequestStage:
      type: string
      enum: [Received, Reviewed, Actioned, Confirmed]

    InsurerRequest:
      type: object
      required:
        [
          id,
          type,
          policyNo,
          memberName,
          insurer,
          stage,
          notes,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        type:
          $ref: "#/components/schemas/RequestType"
        policyNo:
          type: string
        memberName:
          type: string
        insurer:
          type: string
        stage:
          $ref: "#/components/schemas/RequestStage"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RequestInput:
      type: object
      required: [type, policyNo, memberName, insurer]
      properties:
        type:
          $ref: "#/components/schemas/RequestType"
        policyNo:
          type: string
          minLength: 1
        memberName:
          type: string
          minLength: 1
        insurer:
          type: string
          minLength: 1
        notes:
          type: string

    RequestAdvanceInput:
      type: object
      required: [stage]
      properties:
        stage:
          $ref: "#/components/schemas/RequestStage"

    FacilitySettings:
      type: object
      required: [facilityName]
      properties:
        facilityName:
          type: string

    SettingsInput:
      type: object
      required: [facilityName]
      properties:
        facilityName:
          type: string
          minLength: 1

    DashboardSummary:
      type: object
      required:
        [openRequests, confirmedRequests, activeMembers, deactivatedMembers, inProgress]
      properties:
        openRequests:
          type: integer
        confirmedRequests:
          type: integer
        activeMembers:
          type: integer
        deactivatedMembers:
          type: integer
        inProgress:
          type: array
          items:
            $ref: "#/components/schemas/InsurerRequest"
